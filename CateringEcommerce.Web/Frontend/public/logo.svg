<!-- ENYVORA - Modern eCommerce Catering Logo -->
<!-- Vibrant & Energetic Design -->

<svg xmlns="http://www.w3.org/2000/svg" width="400" height="80" viewBox="0 0 400 80" fill="none">

  <defs>
    <!-- Primary Gradient: Vibrant Orange to Red -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E63946;stop-opacity:1" />
    </linearGradient>

    <!-- Accent Gradient -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C42;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:1" />
    </linearGradient>

    <!-- Text Gradient -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E63946;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D62828;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- ICON: Modern Minimal Food Service Symbol -->
  <g id="icon" transform="translate(15, 15)">

    <!-- Background circle -->
    <circle cx="25" cy="25" r="24" fill="url(#primaryGradient)" opacity="0.1"/>

    <!-- Main icon: Stylized serving dish/plate -->
    <path d="M 15 20 Q 20 12, 25 14 Q 30 16, 35 20 L 33 28 Q 25 32, 17 28 Z"
          fill="url(#primaryGradient)"/>

    <!-- Accent steam lines suggesting freshness -->
    <path d="M 20 12 Q 21 8, 22 12 M 25 10 Q 26 6, 27 10 M 30 12 Q 31 8, 32 12"
          stroke="url(#accentGradient)"
          stroke-width="1.5"
          stroke-linecap="round"
          fill="none"/>

    <!-- Base/shadow of dish -->
    <ellipse cx="25" cy="28" rx="8" ry="3" fill="url(#accentGradient)" opacity="0.4"/>

  </g>

  <!-- WORDMARK: Modern Typography -->
  <text x="75" y="52"
        font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif"
        font-weight="700"
        font-size="32"
        fill="url(#textGradient)"
        letter-spacing="-0.5">
    ENYVORA
  </text>

</svg>
