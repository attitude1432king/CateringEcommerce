<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo-icon.svg" />
    <!-- Use explicit viewport and safe-area support -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>ENYVORA - Catering for Every Occasion</title>

    <!-- Optional: preload font (improves CLS/perf) -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <!-- Google Maps API is loaded dynamically by the app -->
</head>
<body>
    <div id="root"></div>
    <div id="portal-root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <!-- Reflow helper: dispatch a resize when DPR, focus, visibility or pageshow changes -->
    <script>
        (function () {
            const dispatchResize = () => window.dispatchEvent(new Event('resize'));

            // Watch for DPR changes. Polling interval is small and safe.
            let lastDPR = window.devicePixelRatio;
            setInterval(() => {
                if (window.devicePixelRatio !== lastDPR) {
                    lastDPR = window.devicePixelRatio;
                    dispatchResize();
                }
            }, 350);

            // Useful triggers
            window.addEventListener('focus', dispatchResize);
            window.addEventListener('pageshow', dispatchResize);
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') dispatchResize();
            });
        })();
    </script>
</body>
</html>
